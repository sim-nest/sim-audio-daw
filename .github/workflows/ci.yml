# GitHub Actions CI for this crate.
name: ci
on:
  pull_request: {}
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SIMDOC_TOOLING_MANIFEST: ${{ github.workspace }}/sim-tooling/Cargo.toml
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/checkout@v4
        with:
          repository: sim-nest/sim-tooling
          path: sim-tooling
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo metadata --no-deps --format-version 1 >/dev/null
      - run: cargo run -p xtask -- workspace-coverage --check
      - run: cargo fmt --all --check
      - run: cargo fmt --manifest-path crates/sim-lib-stream-jack-provider/Cargo.toml --check
      - run: cargo test --workspace
      - run: cargo test --manifest-path crates/sim-lib-stream-jack-provider/Cargo.toml
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --manifest-path crates/sim-lib-stream-jack-provider/Cargo.toml --all-targets -- -D warnings
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo doc --manifest-path crates/sim-lib-stream-jack-provider/Cargo.toml --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo run -p xtask -- simdoc --check
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - run: cargo clippy -p sim-lib-stream-cpal --all-features --all-targets -- -D warnings
      - run: cargo test -p sim-lib-stream-cpal --all-features
